# Multi-platform Electron installers via electron-builder + GitHub Releases.
# Tag a release: git tag v0.2.0 && git push origin v0.2.0
# Set repo Variables: ELECTRON_START_URL (production Next.js URL the app loads).
# Set repo Secrets: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY (for next build).

name: Release desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}

      - name: Build Electron bundle
        run: npm run build:electron
        env:
          ELECTRON_START_URL: ${{ vars.ELECTRON_START_URL }}

      - name: Publish installers (electron-builder)
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
